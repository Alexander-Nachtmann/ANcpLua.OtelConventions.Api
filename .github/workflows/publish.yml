name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write     # required to publish to GitHub Packages
  id-token: write     # required for npm provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: github-packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # GitHub Packages npm registry — scope @o-ancpplua matches this repo's
          # GitHub org (O-ANcppLua, lowercased). Auth uses GITHUB_TOKEN below;
          # no NPM secret needs to live in repo settings.
          registry-url: 'https://npm.pkg.github.com'
          scope: '@o-ancpplua'
          always-auth: true

      - name: Verify package.json is not private
        run: |
          if [ "$(node -p "require('./package.json').private || false")" = "true" ]; then
            echo "::error::package.json has \"private\": true — refusing to publish."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Build local emitters
        run: npm run build:emitters

      - name: Lint TypeSpec
        run: npm run lint

      - name: Publish to GitHub Packages with provenance
        run: npm publish --access public --provenance --tag "${{ inputs.tag || 'latest' }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
