# ANcpLua.OtelConventions.Api TypeSpec configuration.
# Extracted from Alexander-Nachtmann/qyl after PR #255. Output paths are
# intentionally local to this repository so compilation cannot write back into
# the source repo.

emit:
  - "@ancplua/typespec-emit-csharp"
  - "@ancplua/typespec-emit-duckdb"
  - "@ancplua/typespec-emit-ts-types"
  - "@typespec/http-client-csharp"
  - "@typespec/http-client-js"
  - "@typespec/http-server-csharp"
  - "@typespec/json-schema"

options:
  "@ancplua/typespec-emit-csharp":
    emitter-output-dir: "{project-root}/generated/contracts"

  "@ancplua/typespec-emit-duckdb":
    emitter-output-dir: "{project-root}/generated/duckdb"

  "@ancplua/typespec-emit-ts-types":
    emitter-output-dir: "{project-root}/generated/ts-types"

  "@typespec/http-client-csharp":
    emitter-output-dir: "{project-root}/generated/csharp-client"
    package-name: "ANcpLua.OtelConventions.Api.Client"
    generate-protocol-methods: true
    generate-convenience-methods: true
    disable-xml-docs: false
    new-project: false

  "@typespec/http-client-js":
    emitter-output-dir: "{project-root}/generated/js-client"
    package-name: "@ancplua/otelconventions-api-client"

  "@typespec/json-schema":
    emitter-output-dir: "{project-root}/generated/json-schema"
    file-type: json
    bundleId: ancplua-otelconventions-api

  "@typespec/http-server-csharp":
    emitter-output-dir: "{project-root}/generated/csharp-server"
    output-type: all
    emit-mocks: none
    skip-format: false
    use-swaggerui: false
    overwrite: true
    collection-type: array

linter:
  extends:
    - "@typespec/http/all"
